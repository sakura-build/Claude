<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推箱子 Sokoban</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #d0d0d8;
      color: #333;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }

    .game-container {
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    .info-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .step-counter {
      background: #ddd;
      padding: 0.4rem 1rem;
      border-radius: 6px;
    }

    .step-counter span {
      color: #c07830;
      font-weight: bold;
      font-size: 1.3rem;
    }

    .level-label {
      font-size: 0.95rem;
      color: #555;
      min-width: 5rem;
      text-align: center;
      white-space: nowrap;
    }

    .level-select {
      background: #fff;
      color: #333;
      border: 1px solid #999;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      max-width: 9rem;
    }
    .level-select:hover { border-color: #666; }
    .level-select:focus { border-color: #c07830; }

    .btn {
      background: #ddd;
      color: #333;
      border: 1px solid #999;
      padding: 0.4rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #ccc;
    }

    /* ---- 游戏面板 CSS Grid ---- */
    .board {
      display: inline-grid;
      gap: 0;
      background: #bbb;
      padding: 3px;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .cell {
      width: 50px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.6rem;
      transition: background 0.1s, transform 0.1s;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    /* 墙壁 */
    .cell.wall {
      background: #999;
      font-size: 3.4rem;
      line-height: 1;
      overflow: hidden;
    }
    .cell.wall::after {
      content: '🧱';
    }

    /* 地板 */
    .cell.floor {
      background: #e8e8e8;
    }

    /* 目标点 */
    .cell.target {
      background: #e8e8e8;
      font-size: 2.8rem;
      line-height: 1;
    }

    .cell.target::after {
      content: '⭐';
    }

    /* 玩家 */
    .cell.player {
      background: #e8e8e8;
      font-size: 2.8rem;
      line-height: 1;
    }

    .cell.player::after {
      content: '😎';
    }

    /* 箱子 */
    .cell.box {
      background: #e8e8e8;
      font-size: 2.8rem;
      line-height: 1;
    }

    .cell.box::after {
      content: '📦';
    }

    /* 箱子在目标上 */
    .cell.box-on-target {
      background: #e8e8e8;
      font-size: 2.8rem;
      line-height: 1;
    }

    .cell.box-on-target::after {
      content: '✅';
    }

    /* 胜利弹窗 */
    .win-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .win-overlay.show {
      display: flex;
    }

    .win-dialog {
      background: #fff;
      padding: 2.5rem 3rem;
      border-radius: 16px;
      text-align: center;
      animation: popIn 0.4s ease-out;
      border: 2px solid #c07830;
    }

    .win-dialog h2 {
      font-size: 2rem;
      color: #c07830;
      margin-bottom: 0.5rem;
    }

    .win-dialog p {
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      color: #333;
    }

    .win-btns {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      80% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="game-container">
    <h1>🧱 推箱子</h1>

    <div class="info-bar">
      <div class="step-counter">步数 <span id="steps">0</span></div>
      <span class="level-label" id="levelLabel">第 1/10 关</span>
      <select class="level-select" id="levelSelect"></select>
      <button class="btn" id="resetBtn">🔄 重置</button>
    </div>

    <div id="board" class="board"></div>

    <p class="hint">方向键 / WASD 移动 · 把所有箱子推到红点上</p>
  </div>

  <!-- 胜利弹窗 -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-dialog">
      <h2>🎉 恭喜通关！</h2>
      <p>你用了 <strong id="winSteps">0</strong> 步完成了「<span id="winLevelName"></span>」</p>
      <div class="win-btns">
        <button class="btn" id="winResetBtn">🔄 重玩本关</button>
        <button class="btn" id="winNextBtn" style="display:none">▶ 下一关</button>
      </div>
    </div>
  </div>

  <script>
    // ========== 关卡数据 ==========
    // '#' = 墙, ' ' = 地板, '.' = 目标, '$' = 箱子, '@' = 玩家
    const LEVELS = [
      {
        name: '第1关 · 入门',
        map: [
          '########',
          '#  .   #',
          '#  $   #',
          '# .$ @ #',
          '#  $   #',
          '#   .  #',
          '########',
        ],
      },
      {
        name: '第2关 · 直推',
        map: [
          '########',
          '#   .  #',
          '#   $  #',
          '#  @$  #',
          '#    . #',
          '########',
        ],
      },
      {
        name: '第3关 · 并排',
        map: [
          '########',
          '#  ... #',
          '#  $$$ #',
          '#   @  #',
          '#      #',
          '########',
        ],
      },
      {
        name: '第4关 · 分列',
        map: [
          '#########',
          '# ..  ..#',
          '# $$  $$#',
          '#   @   #',
          '#########',
        ],
      },
      {
        name: '第5关 · 绕路',
        map: [
          '########',
          '# .    #',
          '# $  $ #',
          '# .#   #',
          '#  @ $.#',
          '#       #',
          '########',
        ],
      },
      {
        name: '第6关 · 岔路',
        map: [
          '########',
          '#  ..  #',
          '#  $$  #',
          '#  ..  #',
          '# #  # #',
          '#  $$  #',
          '#  @   #',
          '########',
        ],
      },
      {
        name: '第7关 · 密室',
        map: [
          '########',
          '#  ..  #',
          '#  $$  #',
          '###  ###',
          '#  ..  #',
          '#  $$  #',
          '#   @  #',
          '########',
        ],
      },
      {
        name: '第8关 · 迷阵',
        map: [
          '#########',
          '#  ...  #',
          '#  $$$  #',
          '## . . ##',
          '#  $@$  #',
          '#       #',
          '#########',
        ],
      },
      {
        name: '第9关 · 困斗',
        map: [
          '#########',
          '#   .   #',
          '#  .$.  #',
          '#  $@$  #',
          '# .$  $.#',
          '#       #',
          '#       #',
          '#########',
        ],
      },
      {
        name: '第10关 · 大师',
        map: [
          '#########',
          '#  . .  #',
          '#  $ $  #',
          '# .$ $ .#',
          '#  $@$  #',
          '#  . .  #',
          '#       #',
          '#########',
        ],
      },
      {
        name: '第11关 · 强化',
        map: [
          '#########',
          '#  . .  #',
          '#  $ $  #',
          '# .$#$ .#',
          '#  $@$  #',
          '#  . .  #',
          '#       #',
          '#########',
        ],
      },
    ];

    // ========== 游戏状态 ==========
    let currentLevel = 0;
    let rows, cols;
    let baseMap = [];      // 静态地形: '#' | ' ' | '.'
    let player = { r: 0, c: 0 };
    let boxes = [];        // [{r, c}, ...]
    let targets = [];      // [{r, c}, ...]
    let steps = 0;
    let won = false;

    // ========== 初始化 ==========
    function parseLevel(raw) {
      rows = raw.length;
      cols = Math.max(...raw.map(r => r.length));

      baseMap = [];
      boxes = [];
      targets = [];
      steps = 0;
      won = false;

      for (let r = 0; r < rows; r++) {
        baseMap[r] = [];
        for (let c = 0; c < cols; c++) {
          const ch = raw[r][c] || ' ';
          if (ch === '#' || ch === ' ') {
            baseMap[r][c] = ch;
          } else if (ch === '.') {
            baseMap[r][c] = '.';
            targets.push({ r, c });
          } else if (ch === '$') {
            baseMap[r][c] = ' ';
            boxes.push({ r, c });
          } else if (ch === '*') {
            // 箱子已在目标上（预置）
            baseMap[r][c] = '.';
            boxes.push({ r, c });
            targets.push({ r, c });
          } else if (ch === '@') {
            baseMap[r][c] = ' ';
            player = { r, c };
          } else if (ch === '+') {
            // 玩家在目标上（预置）
            baseMap[r][c] = '.';
            player = { r, c };
            targets.push({ r, c });
          }
        }
      }
    }

    // ========== 渲染 ==========
    function render() {
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
      board.style.gridTemplateRows = `repeat(${rows}, 50px)`;
      board.innerHTML = '';

      // 快速查找：箱子/目标的 set
      const boxSet = new Set(boxes.map(b => `${b.r},${b.c}`));
      const targetSet = new Set(targets.map(t => `${t.r},${t.c}`));

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          const key = `${r},${c}`;
          const isBox = boxSet.has(key);
          const isTarget = targetSet.has(key);
          const isPlayer = (player.r === r && player.c === c);

          // 按优先级确定显示
          if (isPlayer) {
            cell.className = 'cell player';
          } else if (isBox && isTarget) {
            cell.className = 'cell box-on-target';
          } else if (isBox) {
            cell.className = 'cell box';
          } else if (baseMap[r][c] === '#') {
            cell.className = 'cell wall';
          } else if (isTarget) {
            cell.className = 'cell target';
          } else {
            cell.className = 'cell floor';
          }

          board.appendChild(cell);
        }
      }

      document.getElementById('steps').textContent = steps;
    }

    // ========== 移动逻辑 ==========
    function move(dr, dc) {
      if (won) return;

      const newR = player.r + dr;
      const newC = player.c + dc;

      // 越界 / 墙壁
      if (newR < 0 || newR >= rows || newC < 0 || newC >= cols) return;
      if (baseMap[newR][newC] === '#') return;

      // 检查目标位置是否有箱子
      const boxIndex = boxes.findIndex(b => b.r === newR && b.c === newC);

      if (boxIndex !== -1) {
        // 有箱子：尝试推
        const boxNewR = newR + dr;
        const boxNewC = newC + dc;

        // 检查箱子能否被推到目标位置
        if (boxNewR < 0 || boxNewR >= rows || boxNewC < 0 || boxNewC >= cols) return;
        if (baseMap[boxNewR][boxNewC] === '#') return;
        // 目标位置不能有另一个箱子
        if (boxes.some(b => b.r === boxNewR && b.c === boxNewC)) return;

        // 推箱子
        boxes[boxIndex] = { r: boxNewR, c: boxNewC };
        player = { r: newR, c: newC };
        steps++;
      } else {
        // 空地：直接走
        player = { r: newR, c: newC };
        steps++;
      }

      render();
      checkWin();
    }

    // ========== 胜利检测 ==========
    function checkWin() {
      const targetSet = new Set(targets.map(t => `${t.r},${t.c}`));
      const allOnTarget = boxes.every(b => targetSet.has(`${b.r},${b.c}`));

      if (allOnTarget) {
        won = true;
        document.getElementById('winSteps').textContent = steps;
        document.getElementById('winLevelName').textContent = LEVELS[currentLevel].name;
        // 控制「下一关」按钮是否显示
        const winNextBtn = document.getElementById('winNextBtn');
        if (currentLevel < LEVELS.length - 1) {
          winNextBtn.style.display = '';
        } else {
          winNextBtn.style.display = 'none';
        }
        document.getElementById('winOverlay').classList.add('show');
      }
    }

    // ========== 关卡选择下拉框 ==========
    function populateLevelSelect() {
      const select = document.getElementById('levelSelect');
      select.innerHTML = '';
      for (let i = 0; i < LEVELS.length; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `第${i + 1}关 · ${LEVELS[i].name.split('·')[1] || LEVELS[i].name}`;
        select.appendChild(opt);
      }
    }

    // ========== 关卡加载 ==========
    function loadLevel(index) {
      currentLevel = index;
      parseLevel(LEVELS[index].map);
      document.getElementById('winOverlay').classList.remove('show');
      updateLevelUI();
      render();
    }

    function updateLevelUI() {
      document.getElementById('levelLabel').textContent =
        `第 ${currentLevel + 1}/${LEVELS.length} 关`;
      document.getElementById('levelSelect').value = currentLevel;
    }

    // ========== 重置 ==========
    function reset() {
      loadLevel(currentLevel);
    }

    // ========== 键盘控制 ==========
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': move(-1, 0); e.preventDefault(); break;
        case 'ArrowDown': case 's': case 'S': move(1, 0); e.preventDefault(); break;
        case 'ArrowLeft': case 'a': case 'A': move(0, -1); e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': move(0, 1); e.preventDefault(); break;
        case 'r': case 'R': reset(); break;
        case 'n': case 'N': if (won && currentLevel < LEVELS.length - 1) { loadLevel(currentLevel + 1); } break;
      }
    });

    // ========== 按钮事件 ==========
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('winResetBtn').addEventListener('click', reset);
    document.getElementById('winNextBtn').addEventListener('click', () => {
      if (currentLevel < LEVELS.length - 1) loadLevel(currentLevel + 1);
    });
    document.getElementById('levelSelect').addEventListener('change', (e) => {
      loadLevel(parseInt(e.target.value));
    });

    // ========== 启动游戏 ==========
    populateLevelSelect();
    loadLevel(0);
  </script>
</body>

</html>

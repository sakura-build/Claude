<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0b0e17;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(74, 144, 217, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(124, 92, 231, 0.03) 0%, transparent 60%);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .dashboard {
    width: min(920px, 100%);
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* ====== Top Bar ====== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.8rem;
  }
  .topbar h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #e4e8f0;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .api-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #c0c8d8;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    font-size: 0.78rem;
    font-family: 'Inter', monospace;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: #4a90d9; }
  .api-input::placeholder { color: #4a5068; }

  .interval-select {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #c0c8d8;
    padding: 0.4rem 0.5rem;
    border-radius: 8px;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    cursor: pointer;
  }
  .interval-select:focus { border-color: #4a90d9; }
  .interval-select option { background: #161b2e; color: #e4e8f0; }

  .btn-refresh {
    background: rgba(74, 144, 217, 0.12);
    border: 1px solid rgba(74, 144, 217, 0.25);
    color: #7ab4f0;
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-refresh:hover {
    background: rgba(74, 144, 217, 0.2);
    border-color: rgba(74, 144, 217, 0.4);
  }
  .btn-refresh:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ====== Error Banner ====== */
  .error-banner {
    display: none;
    background: rgba(240, 112, 112, 0.1);
    border: 1px solid rgba(240, 112, 112, 0.25);
    color: #f5a0a0;
    padding: 0.6rem 1rem;
    border-radius: 10px;
    font-size: 0.8rem;
    justify-content: space-between;
    align-items: center;
  }
  .error-banner.show { display: flex; }
  .error-banner .retry-link {
    color: #7ab4f0;
    cursor: pointer;
    text-decoration: underline;
    margin-left: 1rem;
    white-space: nowrap;
  }

  /* ====== KPI Cards ====== */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }

  .kpi-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 14px 14px 0 0;
  }
  .kpi-card:nth-child(1)::after { background: linear-gradient(90deg, #4a90d9, #6db3f2); }
  .kpi-card:nth-child(2)::after { background: linear-gradient(90deg, #4ecf8b, #6de8a8); }
  .kpi-card:nth-child(3)::after { background: linear-gradient(90deg, #f5a623, #f7c56c); }
  .kpi-card:nth-child(4)::after { background: linear-gradient(90deg, #7c5ce7, #a78bfa); }

  .kpi-icon { font-size: 1.2rem; margin-bottom: 0.5rem; }
  .kpi-label {
    font-size: 0.72rem;
    color: #6b7394;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.3rem;
  }
  .kpi-value {
    font-size: 1.7rem;
    font-weight: 800;
    color: #e4e8f0;
    letter-spacing: -0.02em;
    line-height: 1;
    transition: opacity 0.3s;
  }
  .kpi-value.loading {
    opacity: 0.3;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .kpi-sub {
    font-size: 0.73rem;
    margin-top: 0.3rem;
  }
  .kpi-sub.up { color: #4ecf8b; }
  .kpi-sub.down { color: #f07070; }
  .kpi-sub.neutral { color: #6b7394; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  /* ====== Chart ====== */
  .chart-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 1.6rem 1.8rem 1.4rem;
    backdrop-filter: blur(10px);
    position: relative;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  .chart-title {
    font-size: 1rem;
    font-weight: 600;
    color: #e4e8f0;
  }
  .legend {
    display: flex;
    gap: 1.2rem;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.73rem;
    color: #8b94b0;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 3px;
    background: #4a90d9;
  }
  .last-update {
    font-size: 0.7rem;
    color: #4a5068;
    white-space: nowrap;
  }
  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 0.3rem;
  }
  .status-dot.ok { background: #4ecf8b; }
  .status-dot.error { background: #f07070; }
  .status-dot.loading { background: #f5a623; animation: pulse 1s infinite; }

  .chart-wrapper {
    position: relative;
  }
  .chart-wrapper.loading canvas {
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .chart-wrapper canvas {
    transition: opacity 0.3s;
  }

  @media (max-width: 640px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .topbar { flex-direction: column; align-items: flex-start; }
    .controls { width: 100%; }
    .api-input { flex: 1; min-width: 0; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <div class="topbar">
    <h1>📊 销售数据看板</h1>
    <div class="controls">
      <input class="api-input" id="apiUrl" type="text" placeholder="API 端点（留空使用本地数据）" />
      <select class="interval-select" id="intervalSelect">
        <option value="0">关闭刷新</option>
        <option value="10">10 秒</option>
        <option value="30" selected>30 秒</option>
        <option value="60">60 秒</option>
        <option value="300">5 分钟</option>
      </select>
      <button class="btn-refresh" id="refreshBtn">🔄 刷新</button>
    </div>
  </div>

  <div class="error-banner" id="errorBanner">
    <span id="errorMsg"></span>
    <span class="retry-link" id="retryLink">重试</span>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">累计销售额</div>
      <div class="kpi-value" id="kpiTotal">--</div>
      <div class="kpi-sub neutral" id="kpiTotalSub">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">📈</div>
      <div class="kpi-label">年均复合增长</div>
      <div class="kpi-value" id="kpiCagr">--</div>
      <div class="kpi-sub" id="kpiCagrSub">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">🏆</div>
      <div class="kpi-label">年度峰值</div>
      <div class="kpi-value" id="kpiPeak">--</div>
      <div class="kpi-sub neutral" id="kpiPeakSub">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">📉</div>
      <div class="kpi-label">同比变化</div>
      <div class="kpi-value" id="kpiYoy">--</div>
      <div class="kpi-sub" id="kpiYoySub">--</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">年度销售额趋势</span>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot"></span><span id="chartUnit">亿元</span></div>
      </div>
    </div>
    <div class="chart-wrapper" id="chartWrapper">
      <canvas id="salesChart"></canvas>
    </div>
    <div style="text-align:right; margin-top:0.5rem;">
      <span class="last-update" id="lastUpdate">等待数据…</span>
    </div>
  </div>

</div>

<script>
// ========== 默认本地 Mock 数据 ==========
const DEFAULT_DATA = {
  labels: ['2022', '2023', '2024', '2025', '2026'],
  values: [8, 10, 12, 15, 13],
  unit: '亿',
};

// ========== 全局状态 ==========
let chart = null;
let refreshTimer = null;
let currentData = null;
let isLoading = false;

// ========== DOM 引用 ==========
const apiUrlInput = document.getElementById('apiUrl');
const intervalSelect = document.getElementById('intervalSelect');
const refreshBtn = document.getElementById('refreshBtn');
const errorBanner = document.getElementById('errorBanner');
const errorMsg = document.getElementById('errorMsg');
const retryLink = document.getElementById('retryLink');
const chartWrapper = document.getElementById('chartWrapper');
const lastUpdateEl = document.getElementById('lastUpdate');
const chartUnitEl = document.getElementById('chartUnit');

// ========== KPI 计算 ==========
function calcKPIs(labels, values, unit) {
  const n = values.length;
  const total = values.reduce((a, b) => a + b, 0);
  const peak = Math.max(...values);
  const peakYear = labels[values.indexOf(peak)];
  const cagr = n > 1 ? ((Math.pow(values[n - 1] / values[0], 1 / (n - 1)) - 1) * 100) : 0;
  const yoy = n > 1 ? ((values[n - 1] - values[n - 2]) / values[n - 2] * 100) : 0;
  return {
    total: `${total} ${unit}`,
    totalSub: `${labels[0]} – ${labels[n - 1]}`,
    cagr: cagr >= 0 ? `↑ ${cagr.toFixed(1)}%` : `↓ ${Math.abs(cagr).toFixed(1)}%`,
    cagrClass: cagr >= 0 ? 'up' : 'down',
    peak: `${peak} ${unit}`,
    peakSub: `${peakYear} 年度`,
    yoy: yoy >= 0 ? `+${yoy.toFixed(1)}%` : `${yoy.toFixed(1)}%`,
    yoyClass: yoy >= 0 ? 'up' : 'down',
    yoySub: yoy >= 0 ? `↑ 较 ${labels[n - 2]} 年` : `↓ 较 ${labels[n - 2]} 年`,
    rangeText: `${labels[0]} – ${labels[n - 1]}`,
  };
}

// ========== 更新 KPI 卡片 ==========
function updateKPICards(labels, values, unit) {
  const kpi = calcKPIs(labels, values, unit);
  document.getElementById('kpiTotal').textContent = kpi.total;
  document.getElementById('kpiTotalSub').textContent = kpi.totalSub;
  document.getElementById('kpiCagr').textContent = kpi.cagr;
  document.getElementById('kpiCagrSub').textContent = '复合年增长';
  document.getElementById('kpiCagrSub').className = 'kpi-sub ' + kpi.cagrClass;
  document.getElementById('kpiPeak').textContent = kpi.peak;
  document.getElementById('kpiPeakSub').textContent = kpi.peakSub;
  document.getElementById('kpiYoy').textContent = kpi.yoy;
  document.getElementById('kpiYoySub').textContent = kpi.yoySub;
  document.getElementById('kpiYoySub').className = 'kpi-sub ' + kpi.yoyClass;

  // 移除加载态
  document.querySelectorAll('.kpi-value').forEach(el => el.classList.remove('loading'));
}

// ========== 设置 KPI 加载态 ==========
function setKPILoading() {
  document.querySelectorAll('.kpi-value').forEach(el => {
    el.textContent = '--';
    el.classList.add('loading');
  });
}

// ========== 更新图表 ==========
function updateChart(labels, values, unit) {
  const ctx = document.getElementById('salesChart').getContext('2d');
  chartUnitEl.textContent = `销售额（${unit}）`;

  const gradient = ctx.createLinearGradient(0, 0, 0, 320);
  gradient.addColorStop(0, 'rgba(74, 144, 217, 0.18)');
  gradient.addColorStop(0.5, 'rgba(74, 144, 217, 0.04)');
  gradient.addColorStop(1, 'rgba(74, 144, 217, 0.0)');

  const dataMin = Math.min(...values);
  const dataMax = Math.max(...values);
  const dataRange = dataMax - dataMin || 1;
  const padding = dataRange * 0.2;
  const yMin = Math.max(0, Math.floor((dataMin - padding) / 2) * 2);
  const yMax = Math.ceil((dataMax + padding) / 2) * 2;
  const yRange = yMax - yMin;
  const stepSize = yRange <= 8 ? 1 : yRange <= 16 ? 2 : yRange <= 30 ? 5 : Math.ceil(yRange / 5);

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = values;
    chart.data.datasets[0].backgroundColor = gradient;
	    chart.options.scales.y.min = yMin;
	    chart.options.scales.y.ticks.stepSize = stepSize;
    chart.options.scales.y.max = yMax;
    chart.options.scales.y.ticks.callback = v => v + ' ' + unit;
    chart.update('none');
  } else {
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          borderColor: '#4a90d9',
          backgroundColor: gradient,
          borderWidth: 3,
          pointBackgroundColor: '#0b0e17',
          pointBorderColor: '#4a90d9',
          pointBorderWidth: 3,
          pointRadius: 7,
          pointHoverRadius: 10,
          pointHoverBorderWidth: 4,
          pointHoverBackgroundColor: '#4a90d9',
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 1.5,
        animation: { duration: 400 },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#161b2e',
            titleColor: '#8b94b0',
            bodyColor: '#e4e8f0',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            cornerRadius: 10,
            padding: 12,
            titleFont: { size: 11, weight: '500' },
            bodyFont: { size: 16, weight: '700' },
            titleMarginBottom: 6,
            displayColors: false,
            callbacks: {
              label: ctx => `${ctx.parsed.y} ${unit}`
            }
          }
        },
        scales: {
          y: {
            min: yMin,
            max: yMax,
            ticks: {
              stepSize: stepSize,
              color: '#5a6380',
              font: { size: 11 },
              callback: v => v + ' ' + unit,
              padding: 10,
            },
            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
            border: { display: false },
          },
          x: {
            ticks: { color: '#8b94b0', font: { size: 12, weight: '500' }, padding: 10 },
            grid: { display: false },
            border: { color: 'rgba(255,255,255,0.06)' },
          }
        }
      }
    });
  }
}

// ========== 显示 / 隐藏错误 ==========
function showError(msg) {
  errorMsg.textContent = '⚠️ ' + msg + ' — 已降级使用本地数据';
  errorBanner.classList.add('show');
  document.querySelector('.status-dot')?.classList.replace('ok', 'error');
}

function hideError() {
  errorBanner.classList.remove('show');
}

// ========== 更新状态指示器 ==========
function setStatus(status) {
  const dot = lastUpdateEl.querySelector('.status-dot');
  if (!dot) {
    lastUpdateEl.innerHTML = '<span class="status-dot ' + status + '"></span>' + lastUpdateEl.textContent;
  } else {
    dot.className = 'status-dot ' + status;
  }
}

// ========== 获取数据 ==========
async function fetchData(apiUrl) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 5000);

  try {
    const resp = await fetch(apiUrl, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();

    // 验证数据结构
    if (!json.labels || !json.values || !Array.isArray(json.labels) || !Array.isArray(json.values)) {
      throw new Error('数据格式错误：需要 { labels, values }');
    }
    if (json.labels.length !== json.values.length) {
      throw new Error('labels 与 values 长度不一致');
    }
    return json;
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') throw new Error('请求超时');
    throw err;
  }
}

// ========== 加载并渲染数据 ==========
async function loadData() {
  if (isLoading) return;
  isLoading = true;

  const apiUrl = apiUrlInput.value.trim();
  refreshBtn.disabled = true;
  setStatus('loading');
  hideError();

  if (!apiUrl) {
    // 无 API 端点，使用本地 mock
    currentData = { ...DEFAULT_DATA };
    updateDashboard(currentData);
    setStatus('ok');
    lastUpdateEl.innerHTML = '<span class="status-dot ok"></span>最后更新：' + new Date().toLocaleTimeString() + '（本地数据）';
    isLoading = false;
    refreshBtn.disabled = false;
  } else {
    // 有 API 端点，远程获取
    setKPILoading();
    chartWrapper.classList.add('loading');
    try {
      const data = await fetchData(apiUrl);
      const unit = data.unit || '亿';
      currentData = { labels: data.labels, values: data.values, unit };
      updateDashboard(currentData);
      setStatus('ok');
      lastUpdateEl.innerHTML = '<span class="status-dot ok"></span>最后更新：' + new Date().toLocaleTimeString();
      hideError();
    } catch (err) {
      // 降级到本地 mock
      showError(err.message);
      if (!currentData || currentData === DEFAULT_DATA) {
        currentData = { ...DEFAULT_DATA };
        updateDashboard(currentData);
      }
      setStatus('error');
      lastUpdateEl.innerHTML = '<span class="status-dot error"></span>更新失败：' + new Date().toLocaleTimeString();
    }
    chartWrapper.classList.remove('loading');
    isLoading = false;
    refreshBtn.disabled = false;
  }
}

function updateDashboard(data) {
  updateKPICards(data.labels, data.values, data.unit);
  updateChart(data.labels, data.values, data.unit);
}

// ========== 设置定时刷新 ==========
function setupRefreshInterval() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }

  const seconds = parseInt(intervalSelect.value);
  if (seconds > 0 && apiUrlInput.value.trim()) {
    refreshTimer = setInterval(() => {
      if (document.hidden) return;
      loadData();
    }, seconds * 1000);
  }
}

// ========== 事件绑定 ==========
refreshBtn.addEventListener('click', loadData);
retryLink.addEventListener('click', loadData);

apiUrlInput.addEventListener('change', () => {
  setupRefreshInterval();
  loadData();
});

intervalSelect.addEventListener('change', setupRefreshInterval);

// 标签页切换回来时刷新
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && apiUrlInput.value.trim()) {
    loadData();
  }
});

// ========== 启动 ==========
const params = new URLSearchParams(window.location.search);
const apiParam = params.get('api');
if (apiParam) apiUrlInput.value = apiParam;
loadData();
setupRefreshInterval();
</script>
</body>
</html>
